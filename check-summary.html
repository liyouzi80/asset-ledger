<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Returns Summary — Visual Consistency Check</title>
<style>
  :root, [data-theme="dark"] {
    --bg: #08090a;
    --bg-1: #0f1011;
    --bg-2: #191a1b;
    --bg-3: #28282c;
    --ink: #f7f8f8;
    --ink-2: #d0d6e0;
    --ink-3: #8a8f98;
    --ink-4: #62666d;
    --sep: rgba(255,255,255,0.05);
    --sep-strong: rgba(255,255,255,0.08);
    --accent: #5e6ad2;
    --green: #27a644;
    --red: #f87171;
    --tooltip-bg: #191a1b;
  }
  [data-theme="light"] {
    --bg: #ffffff;
    --bg-1: #f5f5f7;
    --bg-2: #e8e8ed;
    --bg-3: #dcdce0;
    --ink: #1d1d1f;
    --ink-2: rgba(29,29,31,0.82);
    --ink-3: #6e6e73;
    --ink-4: #aeaeb2;
    --sep: #d2d2d7;
    --sep-strong: #86868b;
    --accent: #0071e3;
    --green: #34c759;
    --red: #ff3b30;
    --tooltip-bg: #ffffff;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    padding: 40px;
    margin: 0;
  }
  h2 { margin: 40px 0 20px; font-weight: 300; font-size: 24px; }
  h2:first-child { margin-top: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; }

  /* === EXACT COPY of returns-summary CSS === */
  .returns-summary {
    display: flex;
    align-items: flex-end;
    gap: 32px;
    padding-bottom: 20px;
    border-bottom: 0.5px solid var(--sep);
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .returns-summary-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .returns-summary-label {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .returns-summary-value {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .returns-summary-value.pos { color: var(--green); }
  .returns-summary-value.neg { color: var(--red); }
  .returns-summary-value.tiny {
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--ink-3);
  }

  .card {
    background: var(--bg-1);
    border: 1px solid var(--sep-strong);
    border-radius: 16px;
    padding: 24px;
  }
  .card-title {
    font-size: 13px;
    color: var(--ink-3);
    margin-bottom: 16px;
    font-weight: 500;
  }

  .theme-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .theme-bar button {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--sep-strong);
    background: var(--bg-2);
    color: var(--ink-3);
    cursor: pointer;
    font-size: 13px;
  }
  .theme-bar button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .stats { margin-top: 12px; font-size: 13px; color: var(--ink-3); }
  .stats span { font-family: 'JetBrains Mono', monospace; }
  .ok { color: var(--green); }
  .warn { color: var(--red); }
</style>
</head>
<body>

<div class="theme-bar">
  <button onclick="setTheme('dark')" id="btn-dark" class="active">Linear Dark</button>
  <button onclick="setTheme('light')" id="btn-light">Apple Light</button>
</div>

<div class="grid" id="grid"></div>

<script>
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
  document.getElementById('btn-light').classList.toggle('active', t === 'light');
  render();
}

function makeSummary(label, primaryLabel, primaryVal, primaryClass, secondaryLabel, secondaryVal, secondaryClass, range) {
  return `<div class="card">
    <div class="card-title">${label}</div>
    <div class="returns-summary">
      <div class="returns-summary-item">
        <div class="returns-summary-label">${primaryLabel}</div>
        <div class="returns-summary-value ${primaryClass}">${primaryVal}</div>
      </div>
      <div class="returns-summary-item secondary">
        <div class="returns-summary-label">${secondaryLabel}</div>
        <div class="returns-summary-value ${secondaryClass}">${secondaryVal}</div>
      </div>
      <div class="returns-summary-item secondary">
        <div class="returns-summary-label">起止</div>
        <div class="returns-summary-value tiny">${range}</div>
      </div>
    </div>
    <div class="stats">
      primary: <span>36px / 300 / ${primaryClass || 'default'} / ${getComputedStyle(document.documentElement).getPropertyValue(primaryClass === 'pos' ? '--green' : primaryClass === 'neg' ? '--red' : '--ink').trim()}</span><br>
      secondary: <span>36px / 300 / ${secondaryClass || 'default'}</span><br>
      range: <span>14px / 500 / JetBrains Mono</span>
    </div>
  </div>`;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML =
    makeSummary('TWR 指标 (正)', '收益率 · TWR', '+5.23%', 'pos', '累计盈亏', '¥15,800', 'pos', '2025-12 → 2026-04') +
    makeSummary('TWR 指标 (负)', '收益率 · TWR', '−3.17%', 'neg', '累计盈亏', '−¥8,200', 'neg', '2025-10 → 2026-02') +
    makeSummary('简单收益率 (正)', '收益率 · 简单加权', '+4.89%', 'pos', '累计盈亏', '¥12,450', 'pos', '2025-12 → 2026-04') +
    makeSummary('XIRR 指标 (正)', '收益率 · XIRR', '+6.15%', 'pos', 'TWR 对比', '+5.23%', 'pos', '2025-12 → 2026-04') +
    makeSummary('XIRR 指标 (负)', '收益率 · XIRR', '−2.08%', 'neg', 'TWR 对比', '−3.17%', 'neg', '2025-09 → 2026-01') +
    makeSummary('XIRR (零值)', '收益率 · XIRR', '—', '', 'TWR 对比', '—', '', '—') +
    makeSummary('盈亏额 指标 (正)', '累计盈亏', '¥45,800', 'pos', '收益率 · TWR', '+5.23%', 'pos', '2025-12 → 2026-04') +
    makeSummary('盈亏额 指标 (负)', '累计盈亏', '−¥12,300', 'neg', '收益率 · TWR', '−3.17%', 'neg', '2025-08 → 2025-12');
}
render();
</script>
</body>
</html>
